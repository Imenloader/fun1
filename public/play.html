<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Play Game</title>
  <style>
    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
    iframe { width: 100%; height: 100%; border: none; }
    .back { 
      position: absolute; 
      top: 10px; 
      left: 10px; 
      padding: 8px 15px; 
      background: rgba(0,210,255,0.2); 
      color: #00d2ff; 
      border: 1px solid #00d2ff;
      text-decoration: none; 
      border-radius: 5px; 
      font-family: 'Outfit', sans-serif; 
      transition: all 0.3s; 
      z-index: 10; 
      backdrop-filter: blur(5px);
    }
    .back:hover { 
      background: #00d2ff; 
      color: #000;
    }
  </style>
</head>
<body>
  <a href="/" class="back">← Back to Portal</a>
  <iframe id="game-frame" allowfullscreen="true" scrolling="no"></iframe>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const src = urlParams.get('src');
    if (src) {
      document.getElementById('game-frame').src = src;
    } else {
      document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:20%;font-family:sans-serif;">Error: Game not found.</h1>';
    }
  </script>
</body>
</html>
