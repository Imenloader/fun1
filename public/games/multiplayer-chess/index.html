<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplayer Chess (P2P)</title>
  
  <!-- Chessboard.js CSS -->
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  
  <style>
    :root {
      --bg-color: #1a1a2e;
      --text-color: #ffffff;
      --primary: #00d2ff;
      --secondary: #7b2ff7;
      --panel-bg: rgba(0, 0, 0, 0.5);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    h1 {
      margin-bottom: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 600px;
      width: 100%;
    }
    
    .panel {
      background-color: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    
    .menu {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
    }
    
    .btn:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    
    .input-group {
      display: flex;
      gap: 10px;
    }
    
    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 16px;
      outline: none;
    }
    
    input:focus {
      border-color: var(--primary);
    }
    
    .hidden { display: none !important; }
    
    .status-box {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #feca57;
    }
    
    .code-display {
      font-size: 24px;
      font-family: monospace;
      letter-spacing: 2px;
      background: rgba(0,0,0,0.8);
      padding: 10px;
      border-radius: 6px;
      color: var(--primary);
      margin: 10px 0;
      user-select: all;
    }
    
    #board {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <h1>P2P Multiplayer Chess</h1>

  <div class="container">
    
    <!-- Connection Menu -->
    <div id="menu-panel" class="panel">
      <p style="margin-bottom: 15px; color: #ccc;">Play directly with a friend using a peer-to-peer connection. No accounts required.</p>
      
      <div class="menu">
        <button id="btn-host" class="btn">Create Game (Play as White)</button>
        
        <div style="margin: 10px 0; color: #888;">&mdash; OR &mdash;</div>
        
        <div class="input-group">
          <input type="text" id="input-code" placeholder="Enter Room Code" autocomplete="off">
          <button id="btn-join" class="btn">Join (Play as Black)</button>
        </div>
      </div>
      
      <div id="loading-msg" class="hidden" style="margin-top: 15px; color: #feca57;">Connecting...</div>
    </div>

    <!-- Waiting for Peer (Host only) -->
    <div id="waiting-panel" class="panel hidden">
      <h3>Waiting for opponent...</h3>
      <p style="margin: 10px 0; color: #ccc;">Share this Room Code with your friend:</p>
      <div id="room-code-display" class="code-display">----</div>
      <p style="font-size: 14px; color: #888;">(They must enter it in the "Join" box)</p>
    </div>

    <!-- Game UI -->
    <div id="game-panel" class="hidden">
      <div class="panel" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <div id="status" class="status-box" style="margin-bottom: 0;">White to move</div>
          <button id="btn-leave" class="btn" style="padding: 6px 12px; font-size: 14px; background: #ff4757;">Leave Game</button>
        </div>
        <div id="connection-status" style="font-size: 14px; text-align: left; color: #2ed573;">Connected.</div>
      </div>
      
      <div id="board"></div>
    </div>

  </div>

  <!-- Dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

  <script>
    // Elements
    const menuPanel = document.getElementById('menu-panel');
    const waitingPanel = document.getElementById('waiting-panel');
    const gamePanel = document.getElementById('game-panel');
    const roomCodeDisplay = document.getElementById('room-code-display');
    const statusEl = document.getElementById('status');
    const connStatusEl = document.getElementById('connection-status');
    const loadingMsg = document.getElementById('loading-msg');
    
    // State
    let board = null;
    let game = new Chess();
    let myColor = 'w';
    let peer = null;
    let conn = null;
    let connectTimeout = null;
    let isReconnecting = false;

    // Persistent State Management
    let session = JSON.parse(localStorage.getItem('p2p_chess_state')) || null;
    
    function saveSession() {
      if (session) {
        session.fen = game.fen();
        localStorage.setItem('p2p_chess_state', JSON.stringify(session));
      }
    }
    
    function clearSession() {
      session = null;
      localStorage.removeItem('p2p_chess_state');
    }

    function generateId() {
      return Math.random().toString(36).substr(2, 5).toUpperCase();
    }

    // Auto-reconnect on load
    window.onload = () => {
      if (session) {
        isReconnecting = true;
        menuPanel.classList.add('hidden');
        gamePanel.classList.remove('hidden');
        game.load(session.fen);
        myColor = session.myColor;
        
        connStatusEl.innerText = "Reconnecting to game...";
        connStatusEl.style.color = "#feca57";
        
        initBoard();
        initPeer(session.myId);
        
        peer.on('open', () => {
          if (session.role === 'host') {
            connStatusEl.innerText = "Waiting for opponent to reconnect...";
          } else {
            connectToHost(session.targetId, true);
          }
        });
        
        setupPeerHostEvents();
      }
    };

    function initPeer(id = null) {
      if (peer) {
        peer.destroy();
      }
      peer = new Peer(id, { debug: 2 });
      
      peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          if (session && session.myId === id) {
            connStatusEl.innerText = "Reconnecting (ID blocked)...";
            setTimeout(() => initPeer(id), 3000);
          } else {
            document.getElementById('btn-host').click(); 
          }
        } else if (err.type === 'peer-unavailable') {
          if (session && session.role === 'join') {
            connStatusEl.innerText = "Host offline. Retrying...";
            setTimeout(() => connectToHost(session.targetId, true), 3000);
          } else if (!session) {
            alert("Room code not found.");
            resetToMenu();
          }
        } else {
          console.error("Peer error:", err);
          if (!session) {
            alert("Connection error: " + err.type);
            resetToMenu();
          }
        }
      });
      return peer;
    }

    function setupPeerHostEvents() {
      peer.on('connection', (connection) => {
        if (conn && conn.open) {
          conn.close();
        }
        conn = connection;
        conn.on('open', () => {
          setupConnection();
          if (isReconnecting || session) {
            // Send current board state to joining peer to force sync
            conn.send({ type: 'sync', fen: game.fen() });
            connStatusEl.innerText = "Opponent reconnected.";
            connStatusEl.style.color = "#2ed573";
          } else {
            startGame('w');
          }
        });
      });
    }

    // --- Host Logic ---
    document.getElementById('btn-host').addEventListener('click', () => {
      loadingMsg.classList.remove('hidden');
      document.getElementById('btn-host').disabled = true;
      document.getElementById('btn-join').disabled = true;
      
      const hostId = "CHESS-" + generateId();
      initPeer(hostId);
      setupPeerHostEvents();
      
      peer.on('open', (id) => {
        session = { role: 'host', myId: id, targetId: null, myColor: 'w', fen: game.fen() };
        saveSession();
        
        menuPanel.classList.add('hidden');
        waitingPanel.classList.remove('hidden');
        roomCodeDisplay.innerText = id.replace('CHESS-', '');
      });
    });

    // --- Join Logic ---
    document.getElementById('btn-join').addEventListener('click', () => {
      const code = document.getElementById('input-code').value.trim().toUpperCase();
      if (!code) return alert("Please enter a code");
      
      loadingMsg.classList.remove('hidden');
      document.getElementById('btn-host').disabled = true;
      document.getElementById('btn-join').disabled = true;
      
      const myId = "CHESS-J-" + generateId();
      initPeer(myId);

      peer.on('open', () => {
        session = { role: 'join', myId: myId, targetId: "CHESS-" + code, myColor: 'b', fen: game.fen() };
        saveSession();
        connectToHost(code, false);
      });
    });

    document.getElementById('btn-leave').addEventListener('click', () => {
      if (confirm("Are you sure you want to leave the game? This will abandon the match.")) {
        clearSession();
        resetToMenu();
      }
    });

    function connectToHost(code, reconnecting = false) {
      const targetId = code.startsWith("CHESS-") ? code : "CHESS-" + code;
      conn = peer.connect(targetId, { reliable: true });
      
      if (!reconnecting) {
        connectTimeout = setTimeout(() => {
          alert("Connection timed out.");
          clearSession();
          resetToMenu();
        }, 10000);
      }
      
      conn.on('open', () => {
        clearTimeout(connectTimeout);
        setupConnection();
        if (reconnecting) {
          connStatusEl.innerText = "Reconnected to host.";
          connStatusEl.style.color = "#2ed573";
        } else {
          startGame('b');
        }
      });
    }

    function setupConnection() {
      conn.on('data', (data) => {
        if (data.type === 'move') {
          game.move(data.move);
          board.position(game.fen());
          saveSession();
          updateStatus();
        } else if (data.type === 'sync') {
          game.load(data.fen);
          board.position(game.fen());
          saveSession();
          updateStatus();
        }
      });
      
      conn.on('close', () => {
        if (session) {
          connStatusEl.innerText = "Opponent disconnected. Waiting...";
          connStatusEl.style.color = "#ff4757";
        }
      });
    }

    function resetToMenu() {
      clearTimeout(connectTimeout);
      isReconnecting = false;
      menuPanel.classList.remove('hidden');
      waitingPanel.classList.add('hidden');
      gamePanel.classList.add('hidden');
      loadingMsg.classList.add('hidden');
      document.getElementById('btn-host').disabled = false;
      document.getElementById('btn-join').disabled = false;
      
      if (conn) { conn.close(); conn = null; }
      if (peer) { peer.destroy(); peer = null; }
      
      if (board && typeof board.destroy === 'function') {
        try { board.destroy(); } catch(e) {}
      }
      
      const boardEl = document.getElementById('board');
      if (boardEl) boardEl.innerHTML = '';
      
      board = null;
      $(window).off('resize');
    }

    // --- Game Logic ---
    function initBoard() {
      const config = {
        draggable: true,
        position: game.fen(),
        orientation: myColor === 'w' ? 'white' : 'black',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'img/chesspieces/wikipedia/{piece}.png'
      };
      
      if (board && typeof board.destroy === 'function') {
        try { board.destroy(); } catch(e) {}
      }
      
      board = Chessboard('board', config);
      $(window).off('resize').on('resize', board.resize);
      updateStatus();
    }

    function startGame(color) {
      myColor = color;
      isReconnecting = false;
      menuPanel.classList.add('hidden');
      waitingPanel.classList.add('hidden');
      gamePanel.classList.remove('hidden');
      
      game.reset();
      saveSession();
      initBoard();
      
      connStatusEl.innerText = "Connected to opponent.";
      connStatusEl.style.color = "#2ed573";
    }

    function onDragStart(source, piece, position, orientation) {
      if (game.game_over()) return false;
      if (!conn || !conn.open) return false;
      
      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
          (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
        return false;
      }
      
      if (game.turn() !== myColor) {
        return false;
      }
    }

    function onDrop(source, target) {
      const move = game.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      if (move === null) return 'snapback';

      saveSession();
      updateStatus();
      if (conn && conn.open) {
        conn.send({ type: 'move', move: move });
      }
    }

    function onSnapEnd() {
      board.position(game.fen());
    }

    function updateStatus() {
      let statusHTML = '';
      let moveColor = game.turn() === 'w' ? 'White' : 'Black';

      if (game.in_checkmate()) {
        statusHTML = `Game over, ${moveColor} is in checkmate.`;
      } else if (game.in_draw()) {
        statusHTML = 'Game over, drawn position';
      } else {
        statusHTML = `${moveColor} to move`;
        if (game.in_check()) {
          statusHTML += ', ' + moveColor + ' is in check';
        }
      }

      statusEl.innerText = statusHTML;
      
      if (game.turn() === myColor) {
        statusEl.style.color = '#2ed573';
      } else {
        statusEl.style.color = '#feca57';
      }
    }

  </script>
</body>
</html>
