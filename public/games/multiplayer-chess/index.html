<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Pro Chess</title>
  
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-color: #1a1a2e;
      --text-color: #ffffff;
      --primary: #00d2ff;
      --secondary: #7b2ff7;
      --panel-bg: rgba(0, 0, 0, 0.5);
      --highlight: rgba(255, 255, 0, 0.4);
      --dot-color: rgba(0, 0, 0, 0.2);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    h1 {
      margin-bottom: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 900px;
      width: 100%;
    }
    
    .panel {
      background-color: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
    }
    
    .menu-panel { max-width: 500px; margin: 0 auto; text-align: center; }
    
    .menu { display: flex; flex-direction: column; gap: 15px; }
    
    .btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border: none; color: white; padding: 12px 24px; border-radius: 8px;
      font-size: 16px; font-weight: bold; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4); }
    .btn:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-danger { background: #ff4757; }
    .btn-danger:hover { box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); }
    .btn-warning { background: #ffa502; }
    .btn-warning:hover { box-shadow: 0 4px 15px rgba(255, 165, 2, 0.4); }
    .btn-small { padding: 8px 12px; font-size: 14px; }
    
    .input-group { display: flex; gap: 10px; }
    input, select {
      flex: 1; padding: 12px; border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.1);
      color: white; font-size: 16px; outline: none;
    }
    input:focus, select:focus { border-color: var(--primary); }
    select option { background: #1a1a2e; }
    
    .hidden { display: none !important; }
    
    .code-display {
      font-size: 24px; font-family: monospace; letter-spacing: 2px;
      background: rgba(0,0,0,0.8); padding: 10px; border-radius: 6px;
      color: var(--primary); margin: 10px 0; user-select: all; text-align: center;
    }
    
    /* Game Layout */
    .game-layout {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: flex-start;
    }
    
    .board-container {
      flex: 1;
      min-width: 300px;
      max-width: 500px;
    }
    
    #board {
      width: 100%;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    
    .sidebar {
      flex: 1;
      min-width: 300px;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    /* Player Info Cards */
    .player-card {
      background: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .player-details { display: flex; flex-direction: column; gap: 5px; }
    .player-name { font-weight: bold; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .player-material { font-size: 14px; color: #a4b0be; min-height: 20px; }
    
    .clock {
      font-size: 24px; font-family: monospace; font-weight: bold;
      background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 4px;
      transition: background 0.3s;
    }
    .clock.active { background: #3742fa; }
    .clock.low-time { color: #ff4757; }
    
    /* Move History */
    .history-panel {
      background: var(--panel-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      flex-grow: 1;
      min-height: 200px;
      max-height: 300px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .history-header {
      background: rgba(0,0,0,0.4);
      padding: 10px;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .history-body {
      padding: 10px;
      overflow-y: auto;
      flex-grow: 1;
      display: grid;
      grid-template-columns: 30px 1fr 1fr;
      column-gap: 10px;
      row-gap: 5px;
      font-family: monospace;
      font-size: 14px;
    }
    
    .history-turn { color: #888; text-align: right; }
    .history-move { cursor: pointer; padding: 2px 5px; border-radius: 3px; }
    .history-move:hover { background: rgba(255,255,255,0.1); }
    
    .controls { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
    
    /* Board Highlights */
    .highlight-last { background-color: var(--highlight) !important; }
    .legal-dot {
      width: 25%;
      height: 25%;
      background: var(--dot-color);
      border-radius: 50%;
      position: absolute;
      top: 37.5%;
      left: 37.5%;
      pointer-events: none;
    }
    .capture-dot {
      width: 80%;
      height: 80%;
      border: 5px solid var(--dot-color);
      border-radius: 50%;
      position: absolute;
      top: 10%;
      left: 10%;
      background: transparent;
      pointer-events: none;
      box-sizing: border-box;
    }

    #game-over-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      border-radius: 4px;
    }
    .game-over-text { font-size: 24px; font-weight: bold; margin-bottom: 15px; color: #feca57; text-align: center;}
  </style>
</head>
<body>

  <h1>P2P Multiplayer Chess</h1>

  <div class="container">
    
    <!-- Connection Menu -->
    <div id="menu-panel" class="panel menu-panel">
      <p style="margin-bottom: 15px; color: #ccc;">Play directly with a friend using a peer-to-peer connection.</p>
      
      <div class="menu">
        <select id="time-control">
          <option value="unlimited">Unlimited Time</option>
          <option value="60">1 Minute (Bullet)</option>
          <option value="180">3 Minutes (Blitz)</option>
          <option value="300" selected>5 Minutes (Blitz)</option>
          <option value="600">10 Minutes (Rapid)</option>
        </select>
        <button id="btn-host" class="btn">Create Game (Play as White)</button>
        
        <div style="margin: 10px 0; color: #888;">&mdash; OR &mdash;</div>
        
        <div class="input-group">
          <input type="text" id="input-code" placeholder="Enter Room Code" autocomplete="off">
          <button id="btn-join" class="btn">Join (Play as Black)</button>
        </div>
      </div>
      
      <div id="loading-msg" class="hidden" style="margin-top: 15px; color: #feca57;">Connecting...</div>
    </div>

    <!-- Waiting for Peer -->
    <div id="waiting-panel" class="panel menu-panel hidden">
      <h3>Waiting for opponent...</h3>
      <p style="margin: 10px 0; color: #ccc;">Share this Room Code with your friend:</p>
      <div id="room-code-display" class="code-display">----</div>
      <p style="font-size: 14px; color: #888;">(They must enter it in the "Join" box)</p>
    </div>

    <!-- Game UI -->
    <div id="game-panel" class="hidden">
      <div class="game-layout">
        
        <!-- Chess Board -->
        <div class="board-container" style="position: relative;">
          <div id="board"></div>
          <div id="game-over-overlay" class="hidden">
            <div id="game-over-msg" class="game-over-text">Checkmate! White wins.</div>
            <button id="btn-rematch" class="btn hidden">Offer Rematch</button>
          </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
          
          <!-- Opponent Card -->
          <div class="player-card">
            <div class="player-details">
              <div class="player-name"><i class="fa-solid fa-user"></i> <span id="opp-name">Opponent</span></div>
              <div id="opp-material" class="player-material"></div>
            </div>
            <div id="opp-clock" class="clock">--:--</div>
          </div>

          <!-- History Panel -->
          <div class="history-panel">
            <div class="history-header">
              <div id="status" style="color: #feca57;">White to move</div>
              <div id="connection-status" style="font-size: 12px; color: #2ed573;">Connected</div>
            </div>
            <div id="history-body" class="history-body"></div>
            <div class="controls" style="padding: 10px; background: rgba(0,0,0,0.3);">
              <button id="btn-draw" class="btn btn-warning btn-small">Offer Draw</button>
              <button id="btn-resign" class="btn btn-danger btn-small">Resign</button>
            </div>
          </div>

          <!-- My Card -->
          <div class="player-card">
            <div class="player-details">
              <div class="player-name"><i class="fa-solid fa-user"></i> <span id="my-name">You</span></div>
              <div id="my-material" class="player-material"></div>
            </div>
            <div id="my-clock" class="clock">--:--</div>
          </div>
          
          <button id="btn-leave" class="btn btn-danger" style="margin-top: 10px;">Leave Game</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>

  <script>
    // --- UI Elements ---
    const menuPanel = document.getElementById('menu-panel');
    const waitingPanel = document.getElementById('waiting-panel');
    const gamePanel = document.getElementById('game-panel');
    const roomCodeDisplay = document.getElementById('room-code-display');
    const statusEl = document.getElementById('status');
    const connStatusEl = document.getElementById('connection-status');
    const loadingMsg = document.getElementById('loading-msg');
    
    const oppClockEl = document.getElementById('opp-clock');
    const myClockEl = document.getElementById('my-clock');
    const oppMaterialEl = document.getElementById('opp-material');
    const myMaterialEl = document.getElementById('my-material');
    const historyBody = document.getElementById('history-body');
    const gameOverOverlay = document.getElementById('game-over-overlay');
    const gameOverMsg = document.getElementById('game-over-msg');

    // --- State ---
    let board = null;
    let game = new Chess();
    let myColor = 'w';
    let peer = null;
    let conn = null;
    let connectTimeout = null;
    let isReconnecting = false;
    
    // Timer State
    let clockInterval = null;
    
    let session = JSON.parse(localStorage.getItem('p2p_chess_state')) || null;

    function saveSession() {
      if (session) {
        session.fen = game.fen();
        session.pgn = game.pgn();
        if (session.timeControl !== 'unlimited' && !game.game_over() && session.lastMoveTime) {
          const now = Date.now();
          const elapsed = (now - session.lastMoveTime) / 1000;
          if (game.turn() === 'w') session.wTime = Math.max(0, session.wTime - elapsed);
          else session.bTime = Math.max(0, session.bTime - elapsed);
          session.lastMoveTime = now;
        }
        localStorage.setItem('p2p_chess_state', JSON.stringify(session));
      }
    }
    
    function clearSession() {
      session = null;
      localStorage.removeItem('p2p_chess_state');
    }

    function generateId() {
      return Math.random().toString(36).substr(2, 5).toUpperCase();
    }

    // --- Timers ---
    function formatTime(seconds) {
      if (isNaN(seconds)) return "--:--";
      seconds = Math.max(0, Math.ceil(seconds));
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function startClocks() {
      if (clockInterval) clearInterval(clockInterval);
      if (!session || session.timeControl === 'unlimited') {
        myClockEl.innerText = "--:--";
        oppClockEl.innerText = "--:--";
        myClockEl.classList.remove('active', 'low-time');
        oppClockEl.classList.remove('active', 'low-time');
        return;
      }

      clockInterval = setInterval(() => {
        if (game.game_over()) {
          clearInterval(clockInterval);
          return;
        }
        
        const now = Date.now();
        const elapsed = (now - session.lastMoveTime) / 1000;
        
        let curW = session.wTime;
        let curB = session.bTime;
        
        if (game.turn() === 'w') curW -= elapsed;
        else curB -= elapsed;
        
        if (curW <= 0) { curW = 0; handleTimeout('w'); }
        if (curB <= 0) { curB = 0; handleTimeout('b'); }

        const myTime = myColor === 'w' ? curW : curB;
        const oppTime = myColor === 'w' ? curB : curW;

        myClockEl.innerText = formatTime(myTime);
        oppClockEl.innerText = formatTime(oppTime);
        
        myClockEl.classList.toggle('active', game.turn() === myColor);
        oppClockEl.classList.toggle('active', game.turn() !== myColor);
        myClockEl.classList.toggle('low-time', myTime < 30 && myTime > 0);
        oppClockEl.classList.toggle('low-time', oppTime < 30 && oppTime > 0);
      }, 100);
    }

    function handleTimeout(colorLost) {
      clearInterval(clockInterval);
      const winner = colorLost === 'w' ? 'Black' : 'White';
      showGameOver(`${winner} wins on time.`);
      if (conn && conn.open) {
        conn.send({ type: 'timeout', loser: colorLost });
      }
    }

    // --- Networking ---
    window.onload = () => {
      if (session) {
        isReconnecting = true;
        menuPanel.classList.add('hidden');
        gamePanel.classList.remove('hidden');
        game.load_pgn(session.pgn || ""); // Try load pgn for history, fallback fen
        if(!game.pgn()) game.load(session.fen);
        myColor = session.myColor;
        
        connStatusEl.innerText = "Reconnecting...";
        connStatusEl.style.color = "#feca57";
        
        initBoard();
        updateUI();
        initPeer(session.myId);
        
        peer.on('open', () => {
          if (session.role === 'host') {
            connStatusEl.innerText = "Waiting for opponent...";
          } else {
            connectToHost(session.targetId, true);
          }
        });
        setupPeerHostEvents();
      }
    };

    function initPeer(id = null) {
      if (peer) peer.destroy();
      peer = new Peer(id, { debug: 2 });
      
      peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
          if (session && session.myId === id) setTimeout(() => initPeer(id), 3000);
          else document.getElementById('btn-host').click(); 
        } else if (err.type === 'peer-unavailable') {
          if (session && session.role === 'join') setTimeout(() => connectToHost(session.targetId, true), 3000);
          else if (!session) { alert("Room not found."); resetToMenu(); }
        }
      });
      return peer;
    }

    function setupPeerHostEvents() {
      peer.on('connection', (connection) => {
        if (conn && conn.open) conn.close();
        conn = connection;
        conn.on('open', () => {
          setupConnection();
          if (isReconnecting) {
            // Force sync
            conn.send({ type: 'sync', state: session });
            connStatusEl.innerText = "Opponent reconnected.";
            connStatusEl.style.color = "#2ed573";
          } else {
            startGame('w');
          }
        });
      });
    }

    document.getElementById('btn-host').addEventListener('click', () => {
      loadingMsg.classList.remove('hidden');
      document.getElementById('btn-host').disabled = true;
      document.getElementById('btn-join').disabled = true;
      
      const tc = document.getElementById('time-control').value;
      const hostId = "CHESS-" + generateId();
      initPeer(hostId);
      setupPeerHostEvents();
      
      peer.on('open', (id) => {
        session = { 
          role: 'host', myId: id, targetId: null, myColor: 'w', 
          fen: game.fen(), pgn: game.pgn(),
          timeControl: tc, wTime: tc !== 'unlimited' ? parseInt(tc) : null, bTime: tc !== 'unlimited' ? parseInt(tc) : null,
          lastMoveTime: null
        };
        saveSession();
        
        menuPanel.classList.add('hidden');
        waitingPanel.classList.remove('hidden');
        roomCodeDisplay.innerText = id.replace('CHESS-', '');
      });
    });

    document.getElementById('btn-join').addEventListener('click', () => {
      const code = document.getElementById('input-code').value.trim().toUpperCase();
      if (!code) return;
      loadingMsg.classList.remove('hidden');
      const myId = "CHESS-J-" + generateId();
      initPeer(myId);
      peer.on('open', () => {
        // Will get true session data upon sync
        session = { role: 'join', myId: myId, targetId: "CHESS-" + code, myColor: 'b', fen: game.fen() };
        saveSession();
        connectToHost(code, false);
      });
    });

    document.getElementById('btn-leave').addEventListener('click', () => {
      if (confirm("Abandon the match?")) { clearSession(); resetToMenu(); }
    });

    function connectToHost(code, reconnecting = false) {
      const targetId = code.startsWith("CHESS-") ? code : "CHESS-" + code;
      conn = peer.connect(targetId, { reliable: true });
      if (!reconnecting) connectTimeout = setTimeout(() => { alert("Timed out."); clearSession(); resetToMenu(); }, 10000);
      
      conn.on('open', () => {
        clearTimeout(connectTimeout);
        setupConnection();
        if (reconnecting) {
          connStatusEl.innerText = "Reconnected.";
          connStatusEl.style.color = "#2ed573";
        }
      });
    }

    function setupConnection() {
      conn.on('data', (data) => {
        if (data.type === 'move') {
          game.move(data.move);
          board.position(game.fen());
          session.wTime = data.wTime; session.bTime = data.bTime; session.lastMoveTime = Date.now();
          highlightMove(data.move);
          saveSession();
          updateUI();
        } else if (data.type === 'sync') {
          // Joiner syncs from host
          const s = data.state;
          session.timeControl = s.timeControl; session.wTime = s.wTime; session.bTime = s.bTime; session.lastMoveTime = s.lastMoveTime;
          game.load_pgn(s.pgn || "");
          board.position(game.fen());
          if (!isReconnecting) startGame('b', false);
          
          // Apply highlight from history if exists
          const history = game.history({verbose: true});
          if(history.length > 0) highlightMove(history[history.length-1]);
          
          saveSession();
          updateUI();
        } else if (data.type === 'resign') {
          showGameOver(`Opponent resigned. You win!`);
        } else if (data.type === 'draw_offer') {
          if(confirm("Opponent offers a draw. Accept?")) {
            conn.send({type: 'draw_accept'});
            showGameOver("Game drawn by agreement.");
          } else {
            conn.send({type: 'draw_decline'});
          }
        } else if (data.type === 'draw_accept') {
          showGameOver("Draw offer accepted.");
        } else if (data.type === 'draw_decline') {
          alert("Draw offer declined.");
        } else if (data.type === 'timeout') {
          handleTimeout(data.loser);
        }
      });
      
      conn.on('close', () => {
        if (session) {
          connStatusEl.innerText = "Opponent disconnected...";
          connStatusEl.style.color = "#ff4757";
        }
      });
    }

    function resetToMenu() {
      clearTimeout(connectTimeout);
      clearInterval(clockInterval);
      isReconnecting = false;
      menuPanel.classList.remove('hidden');
      waitingPanel.classList.add('hidden');
      gamePanel.classList.add('hidden');
      loadingMsg.classList.add('hidden');
      gameOverOverlay.classList.add('hidden');
      
      if (conn) { conn.close(); conn = null; }
      if (peer) { peer.destroy(); peer = null; }
      if (board && typeof board.destroy === 'function') { try { board.destroy(); } catch(e) {} }
      
      const boardEl = document.getElementById('board');
      if (boardEl) boardEl.innerHTML = '';
      board = null;
      $(window).off('resize');
    }

    // --- Game UI Logic ---
    function initBoard() {
      const config = {
        draggable: true,
        position: game.fen(),
        orientation: myColor === 'w' ? 'white' : 'black',
        onDragStart: onDragStart,
        onDrop: onDrop,
        onSnapEnd: onSnapEnd,
        pieceTheme: 'img/chesspieces/wikipedia/{piece}.png'
      };
      if (board && typeof board.destroy === 'function') try { board.destroy(); } catch(e) {}
      board = Chessboard('board', config);
      $(window).off('resize').on('resize', board.resize);
    }

    function startGame(color, isHost = true) {
      myColor = color;
      isReconnecting = false;
      menuPanel.classList.add('hidden');
      waitingPanel.classList.add('hidden');
      gamePanel.classList.remove('hidden');
      gameOverOverlay.classList.add('hidden');
      
      if (isHost) {
        game.reset();
        session.lastMoveTime = Date.now();
        // Send initial sync
        if (conn && conn.open) conn.send({ type: 'sync', state: session });
      }
      saveSession();
      initBoard();
      updateUI();
      
      connStatusEl.innerText = "Connected.";
      connStatusEl.style.color = "#2ed573";
    }

    function onDragStart(source, piece, position, orientation) {
      if (game.game_over()) return false;
      if (!conn || !conn.open) return false;
      if ((game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
      if (game.turn() !== myColor) return false;
      
      // Show legal moves
      const moves = game.moves({ square: source, verbose: true });
      moves.forEach(m => {
        const sq = $('#board .square-' + m.to);
        if (game.get(m.to)) sq.append('<div class="capture-dot"></div>');
        else sq.append('<div class="legal-dot"></div>');
      });
    }

    function onDrop(source, target) {
      $('#board .square-55d63 .legal-dot, #board .square-55d63 .capture-dot').remove();
      
      const move = game.move({ from: source, to: target, promotion: 'q' });
      if (move === null) return 'snapback';

      if (session.timeControl !== 'unlimited') {
        const now = Date.now();
        const elapsed = (now - session.lastMoveTime) / 1000;
        if (myColor === 'w') session.wTime -= elapsed; else session.bTime -= elapsed;
        session.lastMoveTime = now;
      }

      highlightMove(move);
      saveSession();
      updateUI();
      if (conn && conn.open) conn.send({ type: 'move', move: move, wTime: session.wTime, bTime: session.bTime });
    }

    function onSnapEnd() { board.position(game.fen()); }

    function highlightMove(move) {
      $('#board .square-55d63').removeClass('highlight-last');
      $('#board .square-' + move.from).addClass('highlight-last');
      $('#board .square-' + move.to).addClass('highlight-last');
    }

    function updateUI() {
      updateStatus();
      updateHistory();
      updateMaterial();
      startClocks();
    }

    function updateStatus() {
      let statusHTML = '';
      let moveColor = game.turn() === 'w' ? 'White' : 'Black';

      if (game.in_checkmate()) {
        statusHTML = `Checkmate.`;
        showGameOver(`${moveColor} is in checkmate!`);
      } else if (game.in_draw()) {
        statusHTML = 'Drawn position.';
        showGameOver(`Game drawn.`);
      } else {
        statusHTML = `${moveColor} to move`;
        if (game.in_check()) statusHTML += ' (Check)';
      }
      statusEl.innerText = statusHTML;
    }

    function updateHistory() {
      const history = game.history();
      let html = '';
      for (let i = 0; i < history.length; i += 2) {
        html += `<div class="history-turn">${(i/2)+1}.</div>`;
        html += `<div class="history-move">${history[i]}</div>`;
        if (history[i+1]) html += `<div class="history-move">${history[i+1]}</div>`;
        else html += `<div></div>`;
      }
      historyBody.innerHTML = html;
      historyBody.scrollTop = historyBody.scrollHeight;
    }

    const pieceValues = { 'p': 1, 'n': 3, 'b': 3, 'r': 5, 'q': 9, 'k': 0 };
    function updateMaterial() {
      const fen = game.fen().split(' ')[0];
      let wCount = {'p':8,'n':2,'b':2,'r':2,'q':1};
      let bCount = {'p':8,'n':2,'b':2,'r':2,'q':1};
      
      for(let i=0; i<fen.length; i++) {
        let c = fen[i];
        if (/[pnbrq]/.test(c)) bCount[c]--;
        if (/[PNBRQ]/.test(c)) wCount[c.toLowerCase()]--;
      }
      
      let wScore = 0; let bScore = 0;
      let wCapHtml = ''; let bCapHtml = '';
      
      for (let p in wCount) {
        for(let j=0; j<wCount[p]; j++) { wScore += pieceValues[p]; bCapHtml += `<i class="fa-solid fa-chess-${p === 'p' ? 'pawn' : p === 'n' ? 'knight' : p === 'b' ? 'bishop' : p === 'r' ? 'rook' : 'queen'}"></i> `; }
      }
      for (let p in bCount) {
        for(let j=0; j<bCount[p]; j++) { bScore += pieceValues[p]; wCapHtml += `<i class="fa-solid fa-chess-${p === 'p' ? 'pawn' : p === 'n' ? 'knight' : p === 'b' ? 'bishop' : p === 'r' ? 'rook' : 'queen'}"></i> `; }
      }
      
      const wAdv = wScore - bScore;
      const bAdv = bScore - wScore;
      
      if (wAdv > 0) wCapHtml += ` <span style="color:#2ed573">+${wAdv}</span>`;
      if (bAdv > 0) bCapHtml += ` <span style="color:#2ed573">+${bAdv}</span>`;

      if (myColor === 'w') {
        myMaterialEl.innerHTML = wCapHtml; oppMaterialEl.innerHTML = bCapHtml;
      } else {
        myMaterialEl.innerHTML = bCapHtml; oppMaterialEl.innerHTML = wCapHtml;
      }
    }

    function showGameOver(msg) {
      gameOverOverlay.classList.remove('hidden');
      gameOverMsg.innerText = msg;
      clearInterval(clockInterval);
    }

    // --- Buttons ---
    document.getElementById('btn-resign').addEventListener('click', () => {
      if (!game.game_over() && confirm("Resign the game?")) {
        showGameOver("You resigned.");
        if (conn && conn.open) conn.send({type: 'resign'});
      }
    });

    document.getElementById('btn-draw').addEventListener('click', () => {
      if (!game.game_over()) {
        alert("Draw offer sent.");
        if (conn && conn.open) conn.send({type: 'draw_offer'});
      }
    });

  </script>
</body>
</html>
