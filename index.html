<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcadeX - Ragdoll Games</title>
    <!-- Add Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo">Arcade<span>X</span></div>
        <nav id="main-nav">
          <a href="#" class="active" data-category="All">Home</a>
          <a href="#" data-category="Action">Action</a>
          <a href="#" data-category="Ragdoll">Ragdoll</a>
          <a href="#" data-category="Strategy">Strategy</a>
        </nav>
      </header>
      
      <main>
        <section class="hero">
          <h1>Welcome to ArcadeX</h1>
          <p>The ultimate destination for high-end web games.</p>
          <button class="cta-button" id="btn-play-now">Play Now</button>
        </section>

        <section class="game-grid-container">
          <div class="grid-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 1rem;">
            <h2 style="margin-bottom: 0;">Trending Games</h2>
            <input type="text" id="search-input" placeholder="Search games..." style="padding: 0.6rem 1.2rem; border-radius: 20px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: white; outline: none; width: 100%; max-width: 300px; font-family: var(--font-family); font-size: 1rem;" />
          </div>
          <div id="game-grid" class="game-grid">
            <!-- Game cards will be injected here by main.js -->
          </div>
          <div id="pagination-controls" class="pagination-controls" style="display: flex; justify-content: center; gap: 0.5rem; margin-top: 2rem; flex-wrap: wrap;">
            <!-- Pagination buttons will be injected here -->
          </div>
        </section>
      </main>

      <footer>
        <p>&copy; 2026 ArcadeX. All rights reserved.</p>
      </footer>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
