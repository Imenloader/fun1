<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Play Game - ArcadeX</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      /* ── Game page layout ── */
      .game-page-wrapper {
        display: flex;
        flex-direction: column;
        padding: 1rem 3%;
        max-width: 1600px;
        margin: 0 auto;
        gap: 1.5rem;
      }

      /* ── iframe takes almost full viewport height ── */
      .game-frame-container {
        width: 100%;
        background: #000;
        border: 2px solid var(--accent-color);
        border-radius: 12px;
        overflow: hidden;
        /* 100vh minus header (~64px) minus padding (~2rem) minus meta row (~60px) */
        height: calc(100vh - 120px);
        min-height: 600px;
        box-shadow: 0 0 40px rgba(0, 210, 255, 0.25);
        position: relative;
        transition: all 0.3s ease;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
      }

      /* Theater mode styling (fills browser window) */
      .game-frame-container.theater-mode {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        border: none;
        border-radius: 0;
        margin: 0;
        padding: 0;
      }
      .game-frame-container.theater-mode iframe {
        width: 100%;
        height: 100%;
      }

      /* Fullscreen button overlay */
      .fullscreen-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.6);
        border: 1px solid var(--accent-color);
        color: var(--accent-color);
        padding: 0.4rem 0.8rem;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.8rem;
        font-family: 'Outfit', sans-serif;
        transition: background 0.2s;
        z-index: 10;
      }
      .fullscreen-btn:hover { background: var(--accent-color); color: #000; }

      /* ── Game meta row ── */
      .game-meta {
        display: flex;
        align-items: center;
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .game-meta h1 {
        font-size: 1.8rem;
        margin: 0;
      }
      .game-meta .badge {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 0.3rem 0.9rem;
        font-size: 0.85rem;
        color: var(--accent-color);
      }
      .back-btn {
        margin-left: auto;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-color);
        padding: 0.5rem 1.2rem;
        border-radius: 8px;
        text-decoration: none;
        font-family: 'Outfit', sans-serif;
        font-size: 0.9rem;
        transition: border-color 0.2s, color 0.2s;
      }
      .back-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }

      /* ── More Games grid ── */
      .more-games-section h2 {
        font-size: 1.4rem;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid var(--glass-border);
      }

      .more-games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1rem;
      }

      .more-game-card {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 10px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
      }
      .more-game-card:hover {
        transform: translateY(-4px);
        border-color: var(--accent-color);
        box-shadow: 0 8px 20px rgba(0, 210, 255, 0.15);
      }
      .more-game-card img {
        width: 100%;
        aspect-ratio: 16/9;
        object-fit: cover;
        display: block;
      }
      .more-game-card .card-info {
        padding: 0.6rem 0.8rem;
      }
      .more-game-card .card-info h4 {
        font-size: 0.9rem;
        margin: 0 0 0.2rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .more-game-card .card-info span {
        font-size: 0.75rem;
        color: var(--accent-color);
      }

      @media (max-width: 600px) {
        .game-frame-container { height: calc(100vw * 0.5625); min-height: 220px; }
        .more-games-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="logo"><a href="/" style="color:inherit;text-decoration:none;">Arcade<span>X</span></a></div>
        <nav>
          <a href="/">Home</a>
          <a href="#">Action</a>
          <a href="#">Ragdoll</a>
          <a href="#">Strategy</a>
        </nav>
      </header>

      <main class="game-page-wrapper">

        <!-- Full-width game frame -->
        <div class="game-frame-container" id="game-container">
          <button class="fullscreen-btn" id="fullscreen-btn" title="Fullscreen">⛶ Fullscreen</button>
          <iframe id="game-iframe" allowfullscreen="true" scrolling="no" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups"></iframe>
        </div>

        <!-- Meta row: title, category, back button -->
        <div class="game-meta">
          <h1 id="game-title">Loading...</h1>
          <span class="badge" id="game-category">Please wait</span>
          <a href="/" class="back-btn">← All Games</a>
        </div>

        <!-- More Games grid below -->
        <section class="more-games-section">
          <h2>More Games</h2>
          <div class="more-games-grid" id="sidebar-games">
            <!-- injected by game.js -->
          </div>
        </section>

      </main>

      <footer>
        <p>&copy; 2026 ArcadeX. All rights reserved.</p>
      </footer>
    </div>
    <script type="module" src="/game.js"></script>
  </body>
</html>
